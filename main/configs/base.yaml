# configs/base.yaml — 기본 설정 (모든 실험의 공통 베이스)

project_name: "sdd"
experiment_name: "base"
seed: 42
output_dir: "outputs"

# ── 데이터 ──────────────────────────────────────────────────────────────────
data:
  dataset: "cifar10"           # cifar10 | imagenet
  data_path: "./data"
  image_size: 32
  num_workers: 4
  pin_memory: true

# ── 모델 ──────────────────────────────────────────────────────────────────
model:
  arch: "unet"                 # unet | dit
  # UNet 설정
  unet:
    in_channels: 3
    model_channels: 128
    out_channels: 3
    num_res_blocks: 2
    attention_resolutions: [16, 8]
    dropout: 0.1
    channel_mult: [1, 2, 2, 2]
    num_heads: 4
    feature_layer: "bottleneck"   # 특징 추출 레이어
  # DiT 설정
  dit:
    input_size: 32
    patch_size: 4
    in_channels: 3
    hidden_size: 384
    depth: 12
    num_heads: 6
    feature_layers: [4, 5, 6, 7]  # 중간 블록 인덱스

# ── Diffusion ────────────────────────────────────────────────────────────
diffusion:
  timesteps: 1000
  beta_schedule: "cosine"       # linear | cosine
  beta_start: 0.0001
  beta_end: 0.02

# ── SDD (DINO) ───────────────────────────────────────────────────────────
sdd:
  enabled: true
  # 투영 헤드
  proj_hidden_dim: 2048
  proj_out_dim: 256             # K
  # 온도
  tau_student: 0.1              # τ_s
  tau_teacher: 0.04             # τ_t  (sharpening: τ_t ≪ τ_s)
  # 센터링
  centering_enabled: true
  center_momentum: 0.9          # λ
  # EMA 교사
  ema_momentum: 0.996           # m
  # 타임스텝 게이트
  gate_enabled: true
  gate_type: "hard"             # hard | soft
  t_min_ratio: 0.1              # t_min = t_min_ratio * T
  t_max_ratio: 0.6              # t_max = t_max_ratio * T
  gate_beta: 50.0               # soft gate 선명도 (gate_type=soft일 때)
  # 손실 균형
  lambda_dino: 0.5              # λ in L_SDD = L_MSE + λ * w(t) * L_DINO

# ── 학습 ──────────────────────────────────────────────────────────────────
training:
  batch_size: 128
  total_steps: 500000
  lr: 2.0e-4
  lr_warmup_steps: 5000
  weight_decay: 0.0
  grad_clip: 1.0
  mixed_precision: true         # fp16 학습
  compile: false                # torch.compile (PyTorch 2.0+)

# ── 평가 ──────────────────────────────────────────────────────────────────
evaluation:
  eval_every: 10000
  fid_samples: 50000
  linear_probe:
    enabled: true
    epochs: 100
    lr: 0.01
    batch_size: 256

# ── 로깅 ──────────────────────────────────────────────────────────────────
logging:
  use_wandb: false
  log_every: 100
  save_every: 10000
  keep_last_n: 3
