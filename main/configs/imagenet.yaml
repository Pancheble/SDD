# configs/imagenet.yaml

defaults:
  - base

experiment_name: "sdd_imagenet256"

data:
  dataset: "imagenet"
  image_size: 256
  num_workers: 8

model:
  arch: "dit"
  dit:
    input_size: 256
    patch_size: 4
    hidden_size: 768
    depth: 12
    num_heads: 12
    feature_layers: [4, 5, 6, 7, 8]

training:
  batch_size: 256
  total_steps: 500000
  lr: 1.0e-4
  mixed_precision: true

sdd:
  proj_out_dim: 256
  lambda_dino: 0.5
  t_min_ratio: 0.1
  t_max_ratio: 0.6

evaluation:
  eval_every: 10000
  fid_samples: 50000
