# configs/cifar10.yaml

defaults:
  - base

experiment_name: "sdd_cifar10"

data:
  dataset: "cifar10"
  image_size: 32
  num_workers: 4

model:
  arch: "unet"
  unet:
    model_channels: 128
    channel_mult: [1, 2, 2, 2]
    num_res_blocks: 2
    attention_resolutions: [16]

training:
  batch_size: 128
  total_steps: 200000
  lr: 2.0e-4

evaluation:
  eval_every: 5000
  fid_samples: 10000
